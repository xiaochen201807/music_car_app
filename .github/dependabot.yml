version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-minor:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "flutter"
    groups:
      flutter-minor:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "android"
    groups:
      android-minor:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "cocoapods"
    directory: "/ios"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:30"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "ios"
    groups:
      ios-minor:
        update-types:
          - "minor"
          - "patch"
